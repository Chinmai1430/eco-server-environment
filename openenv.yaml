name: eco-server-environment
version: "2.0.0"
description: >
  Real-world ecological data center management environment. An AI agent
  manages a 15x15 server grid balancing energy, pollution, cooling and
  renewable energy to maximize ecological sustainability. Models the
  genuine challenge of making data centers greener using AI.

author: Chinmai1430
real_world_task: true
domain: "Environmental sustainability / Data center management"

tags:
  - openenv
  - pytorch
  - reinforcement-learning
  - sustainability
  - real-world
  - data-center

base_url: "https://chinmai1430-eco-server-environment.hf.space"

endpoints:
  reset:  "POST /reset"
  step:   "POST /step"
  state:  "GET /state"
  health: "GET /health"

action_space:
  type: object
  required: [action_type]
  properties:
    action_type:
      type: string
      enum: [plant_tree,remove_pollution,monitor,develop,
             install_solar,cool_server,upgrade_efficiency,decommission]
    x:
      type: integer
      minimum: 0
      maximum: 14
    y:
      type: integer
      minimum: 0
      maximum: 14

observation_space:
  type: object
  properties:
    grid:            {type: array,   description: "15x15 grid of cell types"}
    eco_score:       {type: number,  minimum: 0.0, maximum: 1.0}
    pollution:       {type: number,  minimum: 0.0, maximum: 1.0}
    green_cover:     {type: number,  minimum: 0.0, maximum: 1.0}
    temperature:     {type: number,  minimum: 0.0, maximum: 1.0}
    energy_usage:    {type: number,  minimum: 0.0, maximum: 1.0}
    renewable_ratio: {type: number,  minimum: 0.0, maximum: 1.0}
    server_load:     {type: number,  minimum: 0.0, maximum: 1.0}
    uptime:          {type: number,  minimum: 0.0, maximum: 1.0}
    step:            {type: integer}
    done:            {type: boolean}
    reward:          {type: number,  minimum: 0.0, maximum: 1.0}
    last_event:      {type: string}
    win:             {type: boolean}
    lose:            {type: boolean}

reward:
  range: [0.0, 1.0]
  description: >
    Multi-signal reward with 8 components: eco_score(25%),
    delta_improvement(20%), pollution(15%), renewable(15%),
    temperature(10%), uptime(10%), action_bonus(5%), plus
    one-time milestone bonuses and time-efficiency bonus.
    Penalizes heat, critical pollution and low uptime.

tasks:
  - id: task_easy
    name: "Basic Environmental Monitoring"
    difficulty: easy
    description: >
      Monitor the server grid 5 times to establish baseline metrics.
      Success requires completing 5 monitor actions without eco_score
      dropping below 0.3.
    success_criteria:
      monitor_count: 5
      min_eco_score: 0.3
    max_steps: 10
    reward_range: [0.0, 1.0]
    baseline_score: 0.90
    grader: "monitor_steps/5 * 50% + min(eco/0.4,1.0) * 50%"

  - id: task_medium
    name: "Pollution and Temperature Control"
    difficulty: medium
    description: >
      Reduce pollution below 30% AND cool servers below 20% temperature
      while maintaining eco_score above 50% — all within 10 steps.
    success_criteria:
      max_pollution: 0.30
      max_temperature: 0.20
      min_eco_score: 0.50
    max_steps: 10
    reward_range: [0.0, 1.0]
    baseline_score: 0.65
    grader: "pollution_score*35% + temp_score*30% + eco_score*35%"

  - id: task_hard
    name: "Full Ecosystem Recovery"
    difficulty: hard
    description: >
      Transform a critically degraded data center into a sustainable
      ecosystem. Achieve eco_score >= 0.85 AND renewable_ratio >= 0.30
      within 20 steps. Efficiency bonus for finishing early.
    success_criteria:
      min_eco_score: 0.85
      min_renewable_ratio: 0.30
      max_steps: 20
    max_steps: 20
    reward_range: [0.0, 1.0]
    baseline_score: 0.42
    grader: "eco_progress*70% + renewable_progress*30% + efficiency_bonus"

episode:
  max_steps: 50
  win_condition:  "eco_score >= 0.90"
  lose_conditions:
    - "pollution >= 0.95"
    - "uptime <= 0.10"

baseline_scores:
  task_easy:   0.90
  task_medium: 0.65
  task_hard:   0.42

setup:
  python_version: "3.11"
  install: "pip install -r requirements.txt"
  run:    "uvicorn server.app:app --host 0.0.0.0 --port 7860"
  docker: "docker build -t eco-server . && docker run -p 7860:7860 eco-server"

metadata:
  framework:          "FastAPI + PyTorch DQN"
  grid_size:          "15x15"
  cell_types:         7
  actions:            8
  observation_metrics: 8
  real_world_task:    true
  huggingface_space:  "https://huggingface.co/spaces/Chinmai1430/eco-server-environment"
